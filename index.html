<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Midas Hand</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 2rem;
      }

      main {
        max-width: 42rem;
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(2.25rem, 6vw, 4.5rem);
        line-height: 1;
      }

      p {
        margin: 0;
        color: color-mix(in srgb, currentColor 72%, transparent);
        font-size: 1.125rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Midas Hand</h1>
      <p>Coming soon.</p>
    </main>
  </body>
</html>
